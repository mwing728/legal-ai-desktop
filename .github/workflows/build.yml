name: Build Installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            tesseract-ocr \
            poppler-utils \
            cmake \
            libvulkan-dev \
            vulkan-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          Write-Host "OpenSSL installed at:"
          Get-ChildItem "C:\Program Files\OpenSSL-Win64\bin\*.dll" -ErrorAction SilentlyContinue | Select-Object Name

      - name: Build llama-server sidecar (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/download-llama-server.sh

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vulkanVersion = "1.3.290.0"
          $installerUrl = "https://sdk.lunarg.com/sdk/download/$vulkanVersion/windows/VulkanSDK-$vulkanVersion-Installer.exe"
          Write-Host "Downloading Vulkan SDK $vulkanVersion..."
          Invoke-WebRequest -Uri $installerUrl -OutFile VulkanSDK-Installer.exe
          Write-Host "Installing Vulkan SDK (silent)..."
          Start-Process -FilePath .\VulkanSDK-Installer.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\$vulkanVersion"
          Write-Host "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          Write-Host "$sdkPath\Bin" >> $env:GITHUB_PATH
          Write-Host "Vulkan SDK installed at $sdkPath"

      - name: Build llama-server sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outDir = "src-tauri/llama-server"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $repo = "https://github.com/PrismML-Eng/llama.cpp"

          Write-Host "Cloning PrismML llama.cpp fork..."
          git clone --depth 1 $repo llama-cpp-src

          Write-Host "Building llama-server (static, Vulkan)..."
          cmake -B llama-cpp-src/build -S llama-cpp-src -DBUILD_SHARED_LIBS=OFF -DGGML_VULKAN=ON
          cmake --build llama-cpp-src/build -j --target llama-server --config Release

          $bin = Get-ChildItem -Path llama-cpp-src/build -Recurse -Filter "llama-server.exe" | Select-Object -First 1
          Copy-Item $bin.FullName "$outDir/llama-server.exe"

          # Copy all DLLs from the build tree
          Get-ChildItem -Path llama-cpp-src/build -Recurse -Filter "*.dll" | Copy-Item -Destination $outDir -Force

          Remove-Item -Recurse -Force llama-cpp-src

          # Discover ALL runtime DLL dependencies via dumpbin and bundle non-system ones
          $systemDllPatterns = @(
            'kernel32', 'user32', 'advapi32', 'ws2_32', 'bcrypt', 'crypt32',
            'secur32', 'ntdll', 'msvcrt', 'ucrtbase', 'vcruntime', 'msvcp',
            'api-ms-win-', 'ext-ms-win-', 'ole32', 'oleaut32', 'shell32',
            'gdi32', 'comctl32', 'comdlg32', 'shlwapi', 'rpcrt4', 'imm32',
            'winmm', 'version', 'setupapi', 'cfgmgr32', 'winspool'
          )

          function Is-SystemDll($name) {
            $lower = $name.ToLower()
            foreach ($pat in $systemDllPatterns) {
              if ($lower.StartsWith($pat)) { return $true }
            }
            return $false
          }

          $exePath = Join-Path $outDir "llama-server.exe"

          # Locate dumpbin via vswhere (VS is installed but not in PATH on GH Actions)
          $dumpbinPath = $null
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -property installationPath
            $dumpbinPath = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          $needed = @()
          if ($dumpbinPath) {
            Write-Host "Found dumpbin at: $($dumpbinPath.FullName)"
            $dumpOutput = & $dumpbinPath.FullName /dependents $exePath 2>$null
            $needed = $dumpOutput | Where-Object { $_ -match '^\s+\S+\.dll$' } |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not (Is-SystemDll $_) }
          } else {
            Write-Host "WARNING: dumpbin not found, using known DLL list"
            $needed = @("libssl-3-x64.dll", "libcrypto-3-x64.dll", "llama.dll", "ggml.dll", "mtmd.dll")
          }

          $searchDirs = @(
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\OpenSSL\bin",
            "C:\Windows\System32",
            "C:\ProgramData\chocolatey\bin"
          )

          foreach ($dll in $needed) {
            if (Test-Path (Join-Path $outDir $dll)) { continue }
            $found = $null
            try { $found = (where.exe $dll 2>$null) | Select-Object -First 1 } catch {}
            if ($found -and (Test-Path $found)) {
              Copy-Item $found $outDir
              Write-Host "Bundled $dll from $found"
              continue
            }
            foreach ($dir in $searchDirs) {
              $candidate = Join-Path $dir $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate $outDir
                Write-Host "Bundled $dll from $dir"
                break
              }
            }
            if (-not (Test-Path (Join-Path $outDir $dll))) {
              Write-Warning "MISSING: $dll - not found anywhere on build machine"
            }
          }

          Write-Host "All bundled DLLs:"
          Get-ChildItem "$outDir/*.dll" | Format-Table Name, Length

          # Model is downloaded on first launch by the app, not at build time.

          Write-Host "llama-server sidecar ready:"
          Get-ChildItem $outDir | Format-Table Name, Length

      - name: Bundle OCR tools (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src-tauri/ocr-tools/tessdata
          cp "$(which tesseract)" src-tauri/ocr-tools/tesseract
          cp "$(which pdftoppm)" src-tauri/ocr-tools/pdftoppm
          cp /usr/share/tesseract-ocr/*/tessdata/eng.traineddata src-tauri/ocr-tools/tessdata/ 2>/dev/null || \
            curl -fSL -o src-tauri/ocr-tools/tessdata/eng.traineddata \
              https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata
          for bin in src-tauri/ocr-tools/tesseract src-tauri/ocr-tools/pdftoppm; do
            ldd "$bin" 2>/dev/null | grep "=> /" | awk '{print $3}' | while read -r lib; do
              libname="$(basename "$lib")"
              case "$libname" in
                libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|ld-linux*) ;;
                *) cp "$lib" src-tauri/ocr-tools/ 2>/dev/null || true ;;
              esac
            done
          done
          chmod +x src-tauri/ocr-tools/tesseract src-tauri/ocr-tools/pdftoppm
          ls -la src-tauri/ocr-tools/

      - name: Bundle OCR tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tesseract poppler
          mkdir -p src-tauri/ocr-tools/tessdata
          cp "$(brew --prefix)/bin/tesseract" src-tauri/ocr-tools/tesseract
          cp "$(brew --prefix)/bin/pdftoppm" src-tauri/ocr-tools/pdftoppm
          TESSDATA="$(brew --prefix)/share/tessdata"
          if [ -f "$TESSDATA/eng.traineddata" ]; then
            cp "$TESSDATA/eng.traineddata" src-tauri/ocr-tools/tessdata/
          else
            curl -fSL -o src-tauri/ocr-tools/tessdata/eng.traineddata \
              https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata
          fi
          for bin in src-tauri/ocr-tools/tesseract src-tauri/ocr-tools/pdftoppm; do
            otool -L "$bin" 2>/dev/null | grep "$(brew --prefix)" | awk '{print $1}' | while read -r lib; do
              libname="$(basename "$lib")"
              [ ! -f "src-tauri/ocr-tools/$libname" ] && cp "$lib" "src-tauri/ocr-tools/$libname" 2>/dev/null || true
            done
          done
          chmod +x src-tauri/ocr-tools/tesseract src-tauri/ocr-tools/pdftoppm
          ls -la src-tauri/ocr-tools/

      - name: Bundle OCR tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ocrDir = "src-tauri/ocr-tools"
          $tessdata = "$ocrDir/tessdata"
          New-Item -ItemType Directory -Force -Path $tessdata | Out-Null

          # Download Poppler
          $popplerUrl = "https://github.com/oschwartz10612/poppler-windows/releases/download/v25.12.0-0/Release-25.12.0-0.zip"
          Write-Host "Downloading Poppler..."
          Invoke-WebRequest -Uri $popplerUrl -OutFile poppler.zip
          Expand-Archive poppler.zip -DestinationPath poppler-temp
          $popplerBin = Get-ChildItem -Path poppler-temp -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1
          $popplerBinDir = $popplerBin.DirectoryName
          Copy-Item "$popplerBinDir/*.exe" $ocrDir/
          Copy-Item "$popplerBinDir/*.dll" $ocrDir/
          Remove-Item -Recurse -Force poppler-temp, poppler.zip

          # Download Tesseract via choco (available on GH Actions Windows runners)
          Write-Host "Installing Tesseract via Chocolatey..."
          choco install tesseract --no-progress -y
          $tessPath = "C:\Program Files\Tesseract-OCR"
          Copy-Item "$tessPath\tesseract.exe" "$ocrDir/"
          Get-ChildItem "$tessPath\*.dll" | Copy-Item -Destination "$ocrDir/"
          if (Test-Path "$tessPath\tessdata\eng.traineddata") {
            Copy-Item "$tessPath\tessdata\eng.traineddata" "$tessdata/"
          } else {
            Write-Host "Downloading eng.traineddata..."
            Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" -OutFile "$tessdata/eng.traineddata"
          }

          Write-Host "OCR tools bundled:"
          Get-ChildItem $ocrDir -Recurse | Format-Table Name, Length

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Legal AI Assistant ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            **AI model:** Bonsai 8B (~1.2 GB) is downloaded automatically on first launch. Internet connection required for initial setup.

            **Uninstall:** Use your platform's standard uninstall method. To also remove AI model data, use Settings > Delete All Data before uninstalling.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
